name: Deploy preview to GitHub Pages

# Lightweight static preview at https://aratanutra.github.io/Arata/.
# Keeps a live URL during iteration; Netlify will replace this for the
# real production launch.

on:
  push:
    branches:
      - main
      - claude/aeternyx-nextjs-site-WXBgB
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Strip server-only routes (admin, API, middleware)
        # GitHub Pages is static. The Netlify deploy ships the full app
        # including these.
        run: |
          rm -rf src/app/admin
          rm -rf src/app/api
          rm -f middleware.ts

      - name: Build static site
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_ASSET_PREFIX: "/Arata"
        run: npm run build

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages if it has never been turned on for this repo.
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
