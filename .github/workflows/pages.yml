name: Deploy public site to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/aeternyx-nextjs-site-WXBgB
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Strip server-only routes for static export
        # GitHub Pages is static — remove the admin panel, API routes, and
        # NextAuth middleware before building. The Vercel deployment ships
        # those separately.
        run: |
          rm -rf src/app/admin
          rm -rf src/app/api
          rm -f middleware.ts

      - name: Build static site
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_ASSET_PREFIX: "/Arata"
        run: npm run build

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable GitHub Pages on the repo if it has never been turned on.
          # Avoids the need for a manual Settings → Pages click before the
          # first deploy can succeed.
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
